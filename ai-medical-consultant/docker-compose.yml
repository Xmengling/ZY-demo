services:
  db:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zy_demo}
      POSTGRES_USER: ${POSTGRES_USER:-zy_demo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zy_demo_user} -d ${POSTGRES_DB:-zy_demo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-zy_demo_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-zy_demo}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    ports:
      - "80:8000"

volumes:
  postgres-data:
